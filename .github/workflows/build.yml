name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── Cache NDK (path fixed to match actual install location) ──────────────
      # Moved after setup-android so ANDROID_HOME is resolved correctly.
      - name: Cache NDK
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: ${{ env.ANDROID_HOME }}/ndk/25.2.9519653
          key: ndk-25.2.9519653

      - name: Install NDK and CMake
        run: |
          if [ ! -d "$ANDROID_SDK_ROOT/ndk/25.2.9519653" ]; then
            sdkmanager --install "ndk;25.2.9519653" "cmake;3.22.1"
          else
            echo "NDK already installed — skipping download"
          fi
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/25.2.9519653" >> $GITHUB_ENV

      # ── Gradle caching is handled entirely by setup-gradle. ──────────────────
      # The manual actions/cache for ~/.gradle was removed — it was redundant
      # and could conflict with setup-gradle's own cache management.
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'
          cache-read-only: false

      - name: Unzip project
        run: |
          ZIP=$(find . -maxdepth 2 -name "*.zip" -printf "%T@ %p\n" | sort -rn | head -1 | cut -d" " -f2-)
          echo "Found zip: $ZIP"
          unzip -q "$ZIP" -d extracted

      - name: Find project directory
        id: find_project
        run: |
          RESULT=$(find extracted -maxdepth 4 \( -name "settings.gradle" -o -name "settings.gradle.kts" \) | head -1)
          if [ -z "$RESULT" ]; then
            echo "##[error]No settings.gradle found inside the zip!"
            find extracted | sort
            exit 1
          fi
          PROJECT_DIR=$(dirname "$RESULT")
          echo "Found project at: $PROJECT_DIR"
          echo "project_dir=$PROJECT_DIR" >> $GITHUB_OUTPUT

      # ── Cache C++ build outputs (avoids recompiling unchanged .cpp files) ─────
      - name: Cache CMake / C++ build outputs
        uses: actions/cache@v4
        with:
          path: ${{ steps.find_project.outputs.project_dir }}/app/.cxx
          key: cxx-${{ hashFiles('**/CMakeLists.txt', '**/core/*.cpp', '**/core/*.h', '**/jni_bridge.cpp') }}
          restore-keys: cxx-

      - name: Generate Gradle Wrapper
        working-directory: ${{ steps.find_project.outputs.project_dir }}
        run: gradle wrapper --gradle-version=8.6 --distribution-type=bin

      - name: Make gradlew executable
        working-directory: ${{ steps.find_project.outputs.project_dir }}
        run: chmod +x gradlew

      - name: Build Debug APK
        working-directory: ${{ steps.find_project.outputs.project_dir }}
        # --no-daemon:           daemons die with the container anyway — skip the startup cost
        # --configuration-cache: skips the config phase on cache hits
        # --build-cache:         reuses task outputs across builds
        # --parallel:            builds modules in parallel
        run: ./gradlew assembleDebug --no-daemon --configuration-cache --build-cache --parallel
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: App-v${{ github.run_number }}
          path: ${{ steps.find_project.outputs.project_dir }}/app/build/outputs/apk/debug/*.apk
          retention-days: 30
