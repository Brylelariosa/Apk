name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

# ─────────────────────────────────────────────────────────────────────────────
# REQUIRED GITHUB SECRETS  (Settings → Secrets → Actions → New repository secret)
#
#   KEYSTORE_BASE64   → base64-encoded .jks file
#                       Generate once:
#                         keytool -genkey -v -keystore release.jks \
#                           -alias quickshare -keyalg RSA -keysize 2048 \
#                           -validity 10000
#                       Then encode:
#                         base64 -w 0 release.jks   (Linux)
#                         base64 release.jks          (macOS)
#
#   STORE_PASSWORD    → keystore password chosen above
#   KEY_ALIAS         → key alias chosen above  (e.g. "quickshare")
#   KEY_PASSWORD      → key password chosen above
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Java ──────────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── Android SDK ───────────────────────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: ''

      # ── Gradle cache ──────────────────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.android/build-cache
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # ── Setup Gradle ──────────────────────────────────────────────────────
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper
          cache-disabled: false

      # ── Decode keystore from secret ───────────────────────────────────────
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > $RUNNER_TEMP/release.jks
          echo "KEYSTORE_PATH=$RUNNER_TEMP/release.jks" >> $GITHUB_ENV

      # ── Unzip project ─────────────────────────────────────────────────────
      - name: Unzip project
        run: |
          ZIP=$(find . -maxdepth 2 -name "*.zip" | head -1)
          ZIP_NAME=$(basename "$ZIP" .zip)
          echo "zip_name=$ZIP_NAME" >> $GITHUB_ENV
          unzip -q "$ZIP" -d extracted

      # ── Find project root ─────────────────────────────────────────────────
      - name: Find project directory
        id: find_project
        run: |
          RESULT=$(find extracted -name "settings.gradle*" | head -1)
          PROJECT_DIR=$(dirname "$RESULT")
          echo "project_dir=$PROJECT_DIR" >> $GITHUB_OUTPUT
          echo "Found project at: $PROJECT_DIR"

      # ── Bootstrap Gradle wrapper jar if missing ───────────────────────────
      - name: Bootstrap Gradle wrapper jar
        working-directory: ${{ steps.find_project.outputs.project_dir }}
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            echo "gradle-wrapper.jar missing — downloading directly"
            curl -fL \
              "https://github.com/gradle/gradle/raw/v8.6.0/gradle/wrapper/gradle-wrapper.jar" \
              -o gradle/wrapper/gradle-wrapper.jar
          fi

      # ── Permissions ───────────────────────────────────────────────────────
      - name: Make gradlew executable
        working-directory: ${{ steps.find_project.outputs.project_dir }}
        run: chmod +x gradlew

      # ── Build Debug APK ───────────────────────────────────────────────────
      - name: Build Debug APK
        working-directory: ${{ steps.find_project.outputs.project_dir }}
        run: |
          ./gradlew assembleDebug \
            --no-daemon \
            --parallel \
            --build-cache \
            --configuration-cache \
            -Dorg.gradle.jvmargs="-Xmx3g"
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"

      # ── Build Release APK (minified + auto-signed) ────────────────────────
      - name: Build Release APK
        working-directory: ${{ steps.find_project.outputs.project_dir }}
        run: |
          ./gradlew assembleRelease \
            --no-daemon \
            --parallel \
            --build-cache \
            --configuration-cache \
            -Dorg.gradle.jvmargs="-Xmx3g"
        env:
          GRADLE_OPTS:    "-Dorg.gradle.daemon=false"
          KEYSTORE_PATH:  ${{ env.KEYSTORE_PATH }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS:      ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:   ${{ secrets.KEY_PASSWORD }}

      # ── Verify APK outputs ────────────────────────────────────────────────
      - name: Verify APK outputs
        working-directory: ${{ steps.find_project.outputs.project_dir }}
        run: |
          echo "=== All APKs ==="
          find app/build/outputs/apk -name "*.apk" | while read f; do
            echo "  $(du -sh "$f" | cut -f1)  $f"
          done
          echo ""
          echo "=== Release APK signed? ==="
          RELEASE_APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          if [ -n "$RELEASE_APK" ]; then
            if jarsigner -verify "$RELEASE_APK" > /dev/null 2>&1; then
              echo "SIGNED: $RELEASE_APK"
            else
              echo "WARNING: Unsigned APK (signing secrets not set?): $RELEASE_APK"
            fi
          fi

      # ── Upload Debug APK — separate artifact ──────────────────────────────
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.zip_name }}-debug-build${{ github.run_number }}
          path: ${{ steps.find_project.outputs.project_dir }}/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
          if-no-files-found: error

      # ── Upload Release APK — separate artifact ────────────────────────────
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.zip_name }}-release-build${{ github.run_number }}
          path: ${{ steps.find_project.outputs.project_dir }}/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
          if-no-files-found: error
