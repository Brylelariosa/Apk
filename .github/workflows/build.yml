--- FILE: /.github/workflows/build.yml ---

name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache NDK and CMake
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.ANDROID_HOME }}/ndk/25.2.9519653
            ${{ env.ANDROID_HOME }}/ndk/25.1.8937393
            ${{ env.ANDROID_HOME }}/cmake/3.22.1
          key: ndk-25.2.9519653-25.1.8937393-cmake-3.22.1

      - name: Install NDK and CMake
        run: |
          for NDK_VER in "25.2.9519653" "25.1.8937393"; do
            if [ ! -d "$ANDROID_SDK_ROOT/ndk/$NDK_VER" ]; then
              echo "Installing NDK $NDK_VER..."
              sdkmanager --install "ndk;$NDK_VER"
            else
              echo "NDK $NDK_VER already present"
            fi
          done
          if [ ! -d "$ANDROID_SDK_ROOT/cmake/3.22.1" ]; then
            echo "Installing CMake 3.22.1..."
            sdkmanager --install "cmake;3.22.1"
          else
            echo "CMake 3.22.1 already present"
          fi
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/25.2.9519653" >> $GITHUB_ENV

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'
          cache-read-only: false

      - name: Unzip project
        run: |
          ZIP=$(find . -maxdepth 2 -name "*.zip" -printf "%T@ %p\n" | sort -rn | head -1 | cut -d" " -f2-)
          ZIP_NAME=$(basename "$ZIP" .zip)
          echo "zip_name=$ZIP_NAME" >> $GITHUB_ENV
          echo "zip_path=$ZIP" >> $GITHUB_ENV
          echo "Found zip: $ZIP"
          unzip -q "$ZIP" -d extracted

      - name: Find project directory
        id: find_project
        run: |
          RESULT=$(find extracted -maxdepth 4 \( -name "settings.gradle" -o -name "settings.gradle.kts" \) | head -1)
          if [ -z "$RESULT" ]; then
            echo "##[error]No settings.gradle found inside the zip!"
            find extracted | sort
            exit 1
          fi
          PROJECT_DIR=$(dirname "$RESULT")
          echo "Found project at: $PROJECT_DIR"
          echo "project_dir=$PROJECT_DIR" >> $GITHUB_OUTPUT

      - name: Cache CMake / C++ build outputs
        uses: actions/cache@v4
        with:
          path: ${{ steps.find_project.outputs.project_dir }}/app/.cxx
          key: cxx-debug-${{ hashFiles('**/CMakeLists.txt', '**/core/*.cpp', '**/core/*.h', '**/jni_bridge.cpp') }}
          restore-keys: cxx-debug-

      - name: Fetch gradle-wrapper.jar
        working-directory: ${{ steps.find_project.outputs.project_dir }}
        run: |
          GRADLE_VERSION="8.6"
          JAR="gradle/wrapper/gradle-wrapper.jar"
          mkdir -p gradle/wrapper
          echo "Downloading gradle-wrapper.jar for Gradle ${GRADLE_VERSION}..."
          curl --fail --silent --show-error --location \
            "https://raw.githubusercontent.com/gradle/gradle/v${GRADLE_VERSION}.0/gradle/wrapper/gradle-wrapper.jar" \
            -o "$JAR"
          SIZE=$(stat -c%s "$JAR")
          echo "Downloaded: $(ls -lh $JAR)"
          if [ "$SIZE" -lt 10000 ]; then
            echo "ERROR: gradle-wrapper.jar is suspiciously small (${SIZE} bytes) — aborting"
            exit 1
          fi
          echo "Jar size OK: ${SIZE} bytes"

      - name: Make gradlew executable
        working-directory: ${{ steps.find_project.outputs.project_dir }}
        run: |
          chmod +x gradlew
          sed -i 's/\r//' gradlew

      - name: Build Debug APK
        id: build
        working-directory: ${{ steps.find_project.outputs.project_dir }}
        run: ./gradlew assembleDebug --no-daemon --configuration-cache --build-cache --parallel
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}

      - name: Delete zip from repo on build failure
        if: failure() && steps.build.conclusion == 'failure'
        run: |
          ZIP="${{ env.zip_path }}"
          if [ -n "$ZIP" ] && [ -f "$ZIP" ]; then
            echo "Build failed — removing zip from repository: $ZIP"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git rm "$ZIP"
            git commit -m "ci: remove $ZIP (build failed on run #${{ github.run_number }})"
            git push
          else
            echo "Zip not found at recorded path, skipping deletion."
          fi

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.zip_name }}-debug-v${{ github.run_number }}
          path: ${{ steps.find_project.outputs.project_dir }}/app/build/outputs/apk/debug/*.apk
          retention-days: 30
