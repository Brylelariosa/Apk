name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── Cache both NDK versions ───────────────────────────────────────────────
      # 25.2 is what we explicitly install; 25.1 is what build.gradle requires
      # (ndkVersion "25.1.8937393"). Without pre-installing 25.1, Gradle auto-
      # downloads it during project configuration — burning ~13s every run.
      - name: Cache NDK
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.ANDROID_HOME }}/ndk/25.2.9519653
            ${{ env.ANDROID_HOME }}/ndk/25.1.8937393
          key: ndk-25.2.9519653-25.1.8937393

      - name: Install NDK and CMake
        run: |
          for NDK_VER in "25.2.9519653" "25.1.8937393"; do
            if [ ! -d "$ANDROID_SDK_ROOT/ndk/$NDK_VER" ]; then
              echo "Installing NDK $NDK_VER..."
              sdkmanager --install "ndk;$NDK_VER"
            else
              echo "NDK $NDK_VER already present"
            fi
          done
          if [ ! -d "$ANDROID_SDK_ROOT/cmake/3.22.1" ]; then
            sdkmanager --install "cmake;3.22.1"
          fi
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/25.2.9519653" >> $GITHUB_ENV

      # ── Gradle caching is handled entirely by setup-gradle ───────────────────
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'
          cache-read-only: false

      - name: Unzip project
        run: |
          ZIP=$(find . -maxdepth 2 -name "*.zip" -printf "%T@ %p\n" | sort -rn | head -1 | cut -d" " -f2-)
          echo "Found zip: $ZIP"
          unzip -q "$ZIP" -d extracted

      - name: Find project directory
        id: find_project
        run: |
          RESULT=$(find extracted -maxdepth 4 \( -name "settings.gradle" -o -name "settings.gradle.kts" \) | head -1)
          if [ -z "$RESULT" ]; then
            echo "##[error]No settings.gradle found inside the zip!"
            find extracted | sort
            exit 1
          fi
          PROJECT_DIR=$(dirname "$RESULT")
          echo "Found project at: $PROJECT_DIR"
          echo "project_dir=$PROJECT_DIR" >> $GITHUB_OUTPUT

      # ── Cache C++ build outputs ───────────────────────────────────────────────
      - name: Cache CMake / C++ build outputs
        uses: actions/cache@v4
        with:
          path: ${{ steps.find_project.outputs.project_dir }}/app/.cxx
          key: cxx-${{ hashFiles('**/CMakeLists.txt', '**/core/*.cpp', '**/core/*.h', '**/jni_bridge.cpp') }}
          restore-keys: cxx-

      # ── Wrapper generation: skip if gradlew already exists in the zip ─────────
      # Previously this step took 1m 11s every run: it started a full Gradle
      # daemon (53s), configured the project, and triggered an NDK auto-download.
      # Most Android project zips already include gradlew, so we skip if present.
      - name: Generate Gradle Wrapper
        working-directory: ${{ steps.find_project.outputs.project_dir }}
        run: |
          if [ -f "gradlew" ]; then
            echo "gradlew already present — skipping wrapper generation"
          else
            echo "No gradlew found — generating..."
            gradle wrapper --gradle-version=8.6 --distribution-type=bin
          fi

      - name: Make gradlew executable
        working-directory: ${{ steps.find_project.outputs.project_dir }}
        run: chmod +x gradlew

      - name: Build Debug APK
        working-directory: ${{ steps.find_project.outputs.project_dir }}
        run: ./gradlew assembleDebug --no-daemon --configuration-cache --build-cache --parallel
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: App-v${{ github.run_number }}
          path: ${{ steps.find_project.outputs.project_dir }}/app/build/outputs/apk/debug/*.apk
          retention-days: 30
