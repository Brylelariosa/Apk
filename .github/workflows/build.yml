name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache NDK and CMake
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.ANDROID_HOME }}/ndk/25.2.9519653
            ${{ env.ANDROID_HOME }}/cmake/3.22.1
          key: ndk-cmake-cache

      - name: Install NDK and CMake
        run: |
          sdkmanager --install "ndk;25.2.9519653" || true
          sdkmanager --install "cmake;3.22.1" || true
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/25.2.9519653" >> $GITHUB_ENV

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Unzip project
        run: |
          ZIP=$(find . -maxdepth 2 -name "*.zip" | head -1)
          ZIP_NAME=$(basename "$ZIP" .zip)
          echo "zip_name=$ZIP_NAME" >> $GITHUB_ENV
          unzip -q "$ZIP" -d extracted

      - name: Find project directory
        id: find_project
        run: |
          RESULT=$(find extracted -name "settings.gradle*" | head -1)
          PROJECT_DIR=$(dirname "$RESULT")
          echo "project_dir=$PROJECT_DIR" >> $GITHUB_OUTPUT

      - name: Make gradlew executable
        working-directory: ${{ steps.find_project.outputs.project_dir }}
        run: chmod +x gradlew

      # 🔨 BUILD DEBUG
      - name: Build Debug APK
        working-directory: ${{ steps.find_project.outputs.project_dir }}
        run: ./gradlew assembleDebug --no-daemon --parallel
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}

      # 🚀 BUILD RELEASE APK
      - name: Build Release APK
        working-directory: ${{ steps.find_project.outputs.project_dir }}
        run: ./gradlew assembleRelease --no-daemon --parallel
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}

      # 📦 BUILD AAB (optional but recommended)
      - name: Build Release Bundle (AAB)
        working-directory: ${{ steps.find_project.outputs.project_dir }}
        run: ./gradlew bundleRelease --no-daemon --parallel
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}

      # 📤 UPLOAD EVERYTHING
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.zip_name }}-outputs-v${{ github.run_number }}
          path: |
            ${{ steps.find_project.outputs.project_dir }}/app/build/outputs/apk/debug/*.apk
            ${{ steps.find_project.outputs.project_dir }}/app/build/outputs/apk/release/*.apk
            ${{ steps.find_project.outputs.project_dir }}/app/build/outputs/bundle/release/*.aab
          retention-days: 30