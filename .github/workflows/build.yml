name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Unzip project
        run: |
          # Pick the most recently modified zip so updating the file always works
          ZIP=$(find . -maxdepth 2 -name "*.zip" -printf "%T@ %p\n" | sort -rn | head -1 | cut -d" " -f2-)
          echo "Found zip: $ZIP"
          unzip -q "$ZIP" -d extracted

      - name: Find project directory
        id: find_project
        run: |
          RESULT=$(find extracted -maxdepth 4 \( -name "settings.gradle" -o -name "settings.gradle.kts" \) | head -1)
          if [ -z "$RESULT" ]; then
            echo "##[error]No settings.gradle found inside the zip!"
            find extracted | sort
            exit 1
          fi
          PROJECT_DIR=$(dirname "$RESULT")
          echo "Found project at: $PROJECT_DIR"
          echo "project_dir=$PROJECT_DIR" >> $GITHUB_OUTPUT

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── NDK + CMake needed for C++ emulator core ──────────────────────────
      - name: Install NDK and CMake
        run: |
          sdkmanager --install "ndk;25.2.9519653" "cmake;3.22.1"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/25.2.9519653" >> $GITHUB_ENV

      - name: Setup Gradle (with caching)
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'
          cache-read-only: false

      - name: Generate Gradle Wrapper
        working-directory: ${{ steps.find_project.outputs.project_dir }}
        run: gradle wrapper --gradle-version=8.6 --distribution-type=bin

      - name: Make gradlew executable
        working-directory: ${{ steps.find_project.outputs.project_dir }}
        run: chmod +x gradlew

      - name: Build Debug APK
        working-directory: ${{ steps.find_project.outputs.project_dir }}
        run: ./gradlew assembleDebug --build-cache --parallel --daemon
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: App-v${{ github.run_number }}
          # Wildcard captures all APKs (handles ABI splits: arm64, x86, universal, etc.)
          path: ${{ steps.find_project.outputs.project_dir }}/app/build/outputs/apk/debug/*.apk
          retention-days: 30
