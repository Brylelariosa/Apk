name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Java ──────────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── Android SDK (no NDK/CMake — QuickShare doesn't use native code) ──
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: ''   # skip extra packages — build.gradle pulls what it needs

      # ── Gradle cache (speeds up re-runs significantly) ────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.android/build-cache
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # ── Setup Gradle ──────────────────────────────────────────────────────
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper
          cache-disabled: false

      # ── Unzip project ─────────────────────────────────────────────────────
      - name: Unzip project
        run: |
          ZIP=$(find . -maxdepth 2 -name "*.zip" | head -1)
          ZIP_NAME=$(basename "$ZIP" .zip)
          echo "zip_name=$ZIP_NAME" >> $GITHUB_ENV
          unzip -q "$ZIP" -d extracted

      # ── Find project root (wherever settings.gradle lives) ────────────────
      - name: Find project directory
        id: find_project
        run: |
          RESULT=$(find extracted -name "settings.gradle*" | head -1)
          PROJECT_DIR=$(dirname "$RESULT")
          echo "project_dir=$PROJECT_DIR" >> $GITHUB_OUTPUT
          echo "Found project at: $PROJECT_DIR"

      # ── Bootstrap Gradle wrapper jar if missing ───────────────────────────
      - name: Bootstrap Gradle wrapper jar
        working-directory: ${{ steps.find_project.outputs.project_dir }}
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            echo "gradle-wrapper.jar missing — downloading directly"
            curl -fL \
              "https://github.com/gradle/gradle/raw/v8.6.0/gradle/wrapper/gradle-wrapper.jar" \
              -o gradle/wrapper/gradle-wrapper.jar
            echo "Downloaded: $(ls -lh gradle/wrapper/gradle-wrapper.jar)"
          else
            echo "gradle-wrapper.jar already present — skipping"
          fi

      # ── Permissions ───────────────────────────────────────────────────────
      - name: Make gradlew executable
        working-directory: ${{ steps.find_project.outputs.project_dir }}
        run: chmod +x gradlew

      # ── Build Debug APK ───────────────────────────────────────────────────
      - name: Build Debug APK
        working-directory: ${{ steps.find_project.outputs.project_dir }}
        run: |
          ./gradlew assembleDebug \
            --no-daemon \
            --parallel \
            --build-cache \
            --configuration-cache \
            -Dorg.gradle.jvmargs="-Xmx3g" \
            2>&1 | tee debug-build.log
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"

      # ── Build Release APK (minified + shrunk) ─────────────────────────────
      - name: Build Release APK
        working-directory: ${{ steps.find_project.outputs.project_dir }}
        run: |
          ./gradlew assembleRelease \
            --no-daemon \
            --parallel \
            --build-cache \
            --configuration-cache \
            -Dorg.gradle.jvmargs="-Xmx3g" \
            2>&1 | tee release-build.log
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"

      # ── Print APK sizes ───────────────────────────────────────────────────
      - name: Print APK sizes
        working-directory: ${{ steps.find_project.outputs.project_dir }}
        run: |
          echo "=== APK sizes ==="
          find app/build/outputs/apk -name "*.apk" -exec sh -c 'echo "$(du -sh "$1" | cut -f1)  $1"' _ {} \; | sort
          echo ""
          echo "=== Release APKs ==="
          find app/build/outputs/apk/release -name "*.apk" 2>/dev/null || echo "No release APKs found"

      # ── Upload all artifacts ──────────────────────────────────────────────
      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.zip_name }}-v${{ github.run_number }}
          path: |
            ${{ steps.find_project.outputs.project_dir }}/app/build/outputs/apk/debug/*.apk
            ${{ steps.find_project.outputs.project_dir }}/app/build/outputs/apk/release/*.apk
          retention-days: 30
          if-no-files-found: warn
