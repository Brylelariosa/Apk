name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract project ZIP
        run: |
          ZIP=$(find . -maxdepth 1 -name "*.zip" | head -1)
          echo "Found zip: $ZIP"
          unzip "$ZIP" -d extracted
          # Move contents up (handles nested folder inside zip)
          INNER=$(ls extracted/)
          mv extracted/$INNER/* . 2>/dev/null || mv extracted/* . 2>/dev/null || true
          rm -rf extracted "$ZIP"
          ls -la

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Download Gradle Wrapper JAR
        run: |
          mkdir -p gradle/wrapper
          curl -sL "https://raw.githubusercontent.com/gradle/gradle/v8.6.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK ⬇️
        uses: actions/upload-artifact@v4
        with:
          name: MangaTool-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
